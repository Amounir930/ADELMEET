# SOVEREIGN INFRASTRUCTURE: DOCKER DEPLOYMENT
version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=${LIVEKIT_URL}
    restart: always

  student-portal:
    build:
      context: ./student-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL_BASE=https://api.60sec.shop/api
    restart: always

  command-center:
    build:
      context: ./wall-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL_BASE=https://api.60sec.shop/api
    restart: always

  master-proxy:
    image: nginx:stable-alpine
    volumes:
      - ./master-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - student-portal
      - command-center
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --appendonly yes

volumes:
  redis_data:
